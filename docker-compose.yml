services:

  # ── PostgreSQL 16 with pgvector extension (required for AI embeddings later) ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: threatpulse-postgres
    environment:
      POSTGRES_DB: threatpulse
      POSTGRES_USER: threatpulse
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Zookeeper (required by Kafka for cluster coordination) ───────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: threatpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Apache Kafka ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: threatpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST — used by your machine to connect (localhost:9092)
      # PLAINTEXT      — used by other containers to connect (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis (feed caching, rate limiting) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: threatpulse-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no  # no persistence needed in dev

  # ── Kafka UI (web interface to inspect topics and messages) ───────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: threatpulse-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

volumes:
  postgres_data:
